spec:
  inputs:
    mender_artifact_version:
      description: Version of mender-artifact to install in the test preparation job
      default: "4.4.1"
    integration_rev:
      description: Revision of the integration repository to clone (defaults to master)
      default: "master"
    prep_stage:
      description: Pipeline stage for the test preparation job
      default: test_prep
    test_stage:
      description: Pipeline stage for the acceptance test job
      default: test
    publish_stage:
      description: Pipeline stage for the publish job
      default: publish
    runner:
      description: GitLab CI runner tag
      default: k8s
    publish_runner:
      description: GitLab CI runner tag for the publish job
      default: k8s-small
---

test:prepare_acceptance:
  tags:
    - $[[ inputs.runner ]]
  stage: $[[ inputs.prep_stage ]]
  needs: []
  image: docker:28
  rules:
    - if: '$CI_COMMIT_TAG =~ /^saas-[a-zA-Z0-9.]+$/'
      when: never
    - when: on_success
  services:
    - docker:28-dind
  variables:
    MENDER_ARTIFACT_VERSION: $[[ inputs.mender_artifact_version ]]
  script:
    - docker build -f Dockerfile.acceptance-testing -t $DOCKER_REPOSITORY:prtest .
    - docker save $DOCKER_REPOSITORY:prtest > tests_image.tar
    - docker build -t $DOCKER_REPOSITORY:pr .
    - CONTAINER_ID=$(docker create "$DOCKER_REPOSITORY:pr")
    - docker cp "$CONTAINER_ID:/usr/bin/${CI_PROJECT_NAME}" "$(pwd)"
    - docker rm "$CONTAINER_ID"
    - if [ -f tests/Dockerfile ]; then
    -   docker build -t testing -f tests/Dockerfile tests
    -   docker save testing > acceptance_testing_image.tar
    - fi
    - apk add --no-cache dpkg zstd
    - wget "https://downloads.mender.io/repos/workstation-tools/pool/main/m/mender-artifact/mender-artifact_${MENDER_ARTIFACT_VERSION}-1%2bubuntu%2bnoble_amd64.deb"
      --output-document mender-artifact.deb
    - dpkg --extract mender-artifact.deb /
  artifacts:
    expire_in: 2w
    paths:
      - '*_image.tar'
      - ${CI_PROJECT_NAME}
      - mender-artifact

test:acceptance_tests:
  tags:
    - $[[ inputs.runner ]]
  stage: $[[ inputs.test_stage ]]
  needs:
    - job: test:prepare_acceptance
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^saas-[a-zA-Z0-9.]+$/'
      when: never
    - when: on_success
  image: tiangolo/docker-with-compose
  services:
    - docker:28-dind
  variables:
    INTEGRATION_REV: $[[ inputs.integration_rev ]]
  before_script:
    - apk add git bash
    - git clone -b ${INTEGRATION_REV} --depth=1 https://github.com/mendersoftware/integration.git mender-integration
    - mv mender-integration/extra/travis-testing/* tests/
    - mv docs/* tests/
    - mv ${CI_PROJECT_NAME} tests/
    - ln -s /usr/bin/mender-artifact tests/mender-artifact
    - if [ -f keys/private.pem ]; then
    -   mv keys/private.pem tests/
    - fi
    - docker load -i tests_image.tar
    - if [ -f tests/Dockerfile ]; then
    -   docker load -i acceptance_testing_image.tar
    - fi
    - if [ -n "$REGISTRY_MENDER_IO_USERNAME" ]; then
    -   docker login -u "$REGISTRY_MENDER_IO_USERNAME" -p "$REGISTRY_MENDER_IO_PASSWORD" registry.mender.io
    - fi
    - if [ -n "$MENDER_TEST_CONTAINERS_CANDIDATE_TAG" ]; then
    -   sed -i.bak -e "s,mendersoftware/mender-test-containers:acceptance-testing,$MENDER_TEST_CONTAINERS_CANDIDATE_TAG," tests/docker-compose-acceptance.yml
    -   diff -u tests/docker-compose-acceptance.yml.bak tests/docker-compose-acceptance.yml || true
    -   echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - fi
  script:
    - TESTS_DIR=$(pwd)/tests $(pwd)/tests/run-test-environment acceptance $(pwd)/mender-integration $(pwd)/tests/docker-compose-acceptance.yml
    - if [ -f $(pwd)/tests/docker-compose-acceptance-enterprise.yml ]; then
    -   mv tests/coverage-acceptance.txt cover.prof
    -   TESTS_DIR=$(pwd)/tests $(pwd)/tests/run-test-environment acceptance $(pwd)/mender-integration $(pwd)/tests/docker-compose-acceptance-enterprise.yml
    -   mv tests/coverage-acceptance.txt cover-ent.prof
    -   tail -n +2 cover-ent.prof | cat cover.prof - > tests/coverage-acceptance.txt
    - fi
  artifacts:
    expire_in: 2w
    paths:
      - tests/acceptance.*
      - tests/coverage-acceptance.txt
    reports:
      junit: tests/results.xml
    when: always

publish:acceptance:
  tags:
    - $[[ inputs.publish_runner ]]
  stage: $[[ inputs.publish_stage ]]
  needs:
    - job: test:acceptance_tests
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^saas-[a-zA-Z0-9.]+$/'
      when: never
    - when: on_success
  image: curlimages/curl-base
  allow_failure: true
  script:
    - curl -Os https://cli.codecov.io/latest/alpine/codecov
    - curl -Os https://cli.codecov.io/latest/alpine/codecov.SHA256SUM
    - sha256sum -c codecov.SHA256SUM
    - chmod +x codecov
    - ./codecov upload-process
      --fail-on-error
      --git-service github
      --slug mendersoftware/${CI_PROJECT_NAME}
      --sha ${CI_COMMIT_SHA}
      --pr $(echo "${CI_COMMIT_BRANCH}" | sed 's/^pr_//')
      --file ./tests/coverage-acceptance.txt
      --flag acceptance
