spec:
  inputs:
    stage:
      description: The pipeline stage where to perform the docs release
      default: publish
    runner:
      description: GitLab CI runner tag
      default: hetzner-amd-beefy
    component:
      description: The component name to update versions for
---


release:mender-docs-changelog:
  image: "registry.gitlab.com/northern.tech/mender/mender-test-containers:release-please-v1-master"
  stage: $[[ inputs.stage ]]
  tags:
    - $[[ inputs.runner ]]
  rules:
    # Only make available for stable branches
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
      allow_failure: true
  before_script:
    # Check required input parameters
    - |
      if [ -z "$[[ inputs.component ]]" ]; then
        echo "ERROR: Missing required input parameter 'component'"
        echo "Please specify the component name in your include section:"
        echo "  inputs:"
        echo "    component: your-component-name"
        exit 1
      fi
    # Check required environment variables
    - |
      if [ -z "$GITHUB_USER_EMAIL" ] || [ -z "$GITHUB_USER_NAME" ] || [ -z "$GITHUB_CLI_TOKEN" ] || [ -z "$GITHUB_BOT_TOKEN_REPO_FULL" ]; then
        echo "ERROR: Missing required environment variables:"
        echo "  - GITHUB_USER_EMAIL: ${GITHUB_USER_EMAIL:-'NOT SET'}"
        echo "  - GITHUB_USER_NAME: ${GITHUB_USER_NAME:-'NOT SET'}"
        echo "  - GITHUB_CLI_TOKEN: ${GITHUB_CLI_TOKEN:-'NOT SET'}"
        echo "  - GITHUB_BOT_TOKEN_REPO_FULL: ${GITHUB_BOT_TOKEN_REPO_FULL:-'NOT SET'}"
        exit 1
      fi
    # Install required tools
    - apk add --no-cache python3 curl
    - curl -fsSL https://cli.github.com/packages/alpine/install.sh | sh
    # Setting up git
    - git config --global user.email "${GITHUB_USER_EMAIL}"
    - git config --global user.name "${GITHUB_USER_NAME}"
    # GITHUB_TOKEN for Github cli authentication
    - export GITHUB_TOKEN=${GITHUB_CLI_TOKEN}
  script:
    - git clone https://${GITHUB_USER_NAME}:${GITHUB_BOT_TOKEN_REPO_FULL}@github.com/${GITHUB_CHANGELOG_REPO_URL}
    - cd ${GITHUB_CHANGELOG_REPO_URL#*/}
    - git checkout -b changelog-${CI_JOB_ID}
    - cat ../.docs_header.md > ${CHANGELOG_REMOTE_FILE}
    - cat ../CHANGELOG.md | grep -v -E '^---' >> ${CHANGELOG_REMOTE_FILE}
    - git add ${CHANGELOG_REMOTE_FILE}
    - 'git commit -s -m "chore: add $CI_PROJECT_NAME changelog"'
    - git push origin changelog-${CI_JOB_ID}
    - gh pr create --title "Update CHANGELOG.md for $CI_PROJECT_NAME" --body "Automated change to the CHANGELOG.md file" --base master --head changelog-${CI_JOB_ID}

